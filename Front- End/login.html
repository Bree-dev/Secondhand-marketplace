<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Second-Hand Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 border border-gray-200 shadow-sm max-w-md w-full">
        <h2 class="text-2xl font-extrabold text-gray-900 mb-2 text-center">Welcome Back</h2>
        <p class="text-xs text-gray-500 text-center mb-6">Log in to manage your listings and post new items.</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Email Address</label>
                <input type="email" id="loginEmail" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-gray-900">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Password</label>
                <input type="password" id="loginPassword" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-gray-900">
            </div>
            
            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-2.5 text-xs uppercase tracking-wider hover:bg-gray-800 transition">
                Sign In
            </button>
        </form>
        
        <div class="border-t border-gray-100 mt-6 pt-4 text-center">
            <p class="text-xs text-gray-500">
                Don't have an account? <a href="register.html" class="text-gray-900 font-bold underline">Register here</a>
            </p>
            <p class="text-[11px] text-gray-400 mt-2">
                <a href="index.html" class="hover:text-gray-600 transition">← Back to browsing feed</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
