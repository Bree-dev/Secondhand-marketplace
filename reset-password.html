<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SECONDHAND MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.sharp-card { border-radius: 0px !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="bg-white border border-gray-200 p-6 md:p-8 w-full max-w-md shadow-sm sharp-card">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-black tracking-tight text-emerald-600 uppercase mb-1">Set New Password</h1>
            <p class="text-xs text-gray-500">Provide a secure new password for your marketplace account dashboard.</p>
        </div>

        <form id="resetPasswordForm" class="space-y-4">
            
            <input type="hidden" id="resetTokenInput">

            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">New Password</label>
                <div class="relative flex items-center">
                    <input type="password" id="newPasswordInput" required 
                           class="w-full px-3 py-2 pr-10 border border-gray-300 text-sm focus:outline-none focus:border-gray-900">
                    <button type="button" onclick="togglePasswordVisibility('newPasswordInput', this)" 
                            class="absolute right-3 text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 icon-eye">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
                <p class="text-[10px] text-gray-400 mt-1">Must be at least 6 characters, contain 1 number & 1 special character.</p>
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Confirm New Password</label>
                <div class="relative flex items-center">
                    <input type="password" id="confirmPasswordInput" required 
                           class="w-full px-3 py-2 pr-10 border border-gray-300 text-sm focus:outline-none focus:border-gray-900">
                    <button type="button" onclick="togglePasswordVisibility('confirmPasswordInput', this)" 
                            class="absolute right-3 text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 icon-eye">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-emerald-600 text-white font-bold py-2.5 text-xs uppercase tracking-wider hover:bg-emerald-700 transition">
                Update Password
            </button>
        </form>

        <div id="statusMessage" class="mt-4 text-xs font-medium text-center hidden"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Automatically extract the token from the URL parameters (?token=xyz)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('token')) {
            // Set the value directly into the hidden input field silently
            document.getElementById('resetTokenInput').value = urlParams.get('token');
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('resetTokenInput').value.trim();
            const newPassword = document.getElementById('newPasswordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            const statusDiv = document.getElementById('statusMessage');

            //  1. Frontend Security Interceptor Guard (Regex Complexity Check)
            const passwordRegex = /^(?=.*[0-9])(?=.*[!@#$%^&*(),.?":{}|<>]).{6,}$/;
            if (!passwordRegex.test(newPassword)) {
                statusDiv.classList.remove('hidden', 'text-emerald-600');
                statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                statusDiv.innerText = "Security Rule Violation: Password must be at least 6 characters long and include both a number and a special character.";
                return; // Blocks execution and prevents the fetch request
            }

            // 2. Frontend Guard: Verify both passwords match
            if (newPassword !== confirmPassword) {
                statusDiv.classList.remove('hidden', 'text-emerald-600');
                statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                statusDiv.innerText = "Passwords do not match. Please try again.";
                return;
            }

            if (!token) {
                statusDiv.classList.remove('hidden', 'text-emerald-600');
                statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                statusDiv.innerText = "Invalid recovery session. Please request a new reset link.";
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                
                const data = await response.json();
                
                statusDiv.classList.remove('hidden', 'text-red-500', 'text-emerald-600', 'bg-red-50', 'border-red-200');
                if (response.ok) {
                    statusDiv.className = "mt-4 text-xs font-medium text-center text-emerald-600";
                    statusDiv.innerText = data.message + " Redirecting to login...";
                    setTimeout(() => { window.location.href = 'login.html'; }, 800);
                } else {
                    statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                    statusDiv.innerText = data.message;
                }
            } catch (err) {
                statusDiv.classList.remove('hidden');
                statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                statusDiv.innerText = "Failed to communicate password update request.";
            }
        });

        // ⚡ REUSABLE PASSWORD TOGGLE FUNCTION
        function togglePasswordVisibility(inputId, btnElement) {
            const passwordInput = document.getElementById(inputId);
            const svgContainer = btnElement;

            const openEyeSVG = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
            `;

            const closedEyeSVG = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 1-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
            `;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                svgContainer.innerHTML = closedEyeSVG;
            } else {
                passwordInput.type = 'password';
                svgContainer.innerHTML = openEyeSVG;
            }
        }
    </script>     
</body>
</html>
