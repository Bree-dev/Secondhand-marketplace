<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Second-Hand Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 border border-gray-200 shadow-sm max-w-md w-full">
        <h2 class="text-2xl font-extrabold text-gray-900 mb-6 text-center">Create Seller Account</h2>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Full Name</label>
                <input type="text" id="regName" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-gray-900">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Email Address</label>
                <input type="email" id="regEmail" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-gray-900">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">WhatsApp Number (e.g., 254712345678)</label>
                <input type="text" id="regWhatsApp" required class="w-full border border-gray-300 p-2 text-sm focus:outline-none focus:border-gray-900">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Password</label>
                <div class="relative flex items-center">
                    <input type="password" id="regPassword" required 
                           class="w-full border border-gray-300 p-2 pr-10 text-sm focus:outline-none focus:border-gray-900">
                    <button type="button" onclick="togglePasswordVisibility('regPassword', this)" 
                            class="absolute right-3 text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
                <p class="text-[10px] text-gray-400 mt-1">Must be at least 6 characters, contain 1 number & 1 special character.</p>
            </div>
            
            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-2.5 text-xs uppercase tracking-wider hover:bg-gray-800 transition">
                Sign Up
            </button>
        </form>
        
        <div id="statusMessage" class="mt-4 text-xs font-medium text-center hidden"></div>
        
        <p class="text-xs text-center text-gray-500 mt-4">
            Already have an account? <a href="login.html" class="text-gray-900 font-bold underline">Login here</a>
        </p>
        <div class="pt-2 border-t border-gray-100 mt-4">
            <a href="index.html" class="inline-flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-700 font-medium transition duration-200">
                ← Cancel & Back to Marketplace
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // 1. Password Visibility Toggle
        function togglePasswordVisibility(inputId, btnElement) {
            const passwordInput = document.getElementById(inputId);
            const openEyeSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>`;
            const closedEyeSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 1-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                btnElement.innerHTML = closedEyeSVG;
            } else {
                passwordInput.type = 'password';
                btnElement.innerHTML = openEyeSVG;
            }
        }

        // 2. Frontend Security Interceptor Guard
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const passwordValue = document.getElementById('regPassword').value;
            const statusDiv = document.getElementById('statusMessage');
            
            // Regex: Requires minimum 6 chars, at least 1 number, and 1 special character
            const passwordRegex = /^(?=.*[0-9])(?=.*[!@#$%^&*(),.?":{}|<>]).{6,}$/;

            if (!passwordRegex.test(passwordValue)) {
                e.preventDefault(); // Stop the form from submitting to js/auth.js!
                e.stopImmediatePropagation(); // Prevent other scripts from handling this event

                statusDiv.classList.remove('hidden');
                statusDiv.className = "mt-4 text-xs font-semibold text-center text-red-500 bg-red-50 p-2.5 border border-red-200";
                statusDiv.innerText = "Security Rule Violation: Password must be at least 6 characters long and include both a number and a special character.";
            } else {
                statusDiv.classList.add('hidden'); // Clear error if validation passes
            }
        });
    </script>
</body>
</html>
