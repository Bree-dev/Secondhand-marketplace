<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SECONDHAND MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.sharp-card { border-radius: 0px !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="bg-white border border-gray-200 p-6 md:p-8 w-full max-w-md shadow-sm sharp-card">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-black tracking-tight text-emerald-600 uppercase mb-1">Recover Account</h1>
            <p class="text-xs text-gray-500">Enter your email address to receive a temporary recovery token.</p>
        </div>

        <form id="forgotPasswordForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Email Address</label>
                <input type="email" id="recoveryEmail" required 
                       class="w-full px-3 py-2 border border-gray-300 text-sm sharp-card focus:outline-none focus:border-emerald-500">
            </div>

            <button type="submit" 
                    class="w-full bg-gray-900 text-white font-bold py-2.5 text-xs uppercase tracking-wider hover:bg-gray-800 transition sharp-card">
                Request to Reset Password
            </button>
        </form>

        <div id="statusMessage" class="mt-4 text-xs font-medium text-center hidden p-3 border"></div>

        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
            <a href="login.html" class="text-xs text-gray-400 hover:text-gray-700 font-medium transition">
                ← Back to Login
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value.trim();
            const statusDiv = document.getElementById('statusMessage');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                // Clear out previous styling classes cleanly
                statusDiv.classList.remove('hidden', 'text-red-500', 'text-emerald-700', 'bg-red-50', 'bg-emerald-50', 'border-red-200', 'border-emerald-200');
                statusDiv.classList.add('block'); // Show message box
                
                if (response.ok) {
                    // Style a clean, professional security-standard notification
                    statusDiv.classList.add('text-emerald-700', 'bg-emerald-50', 'border-emerald-200');
                    statusDiv.innerText = data.message || "If that email matches an account, a secure recovery link has been dispatched to your inbox.";
                    
                    // Optional: Clear input field on success
                    document.getElementById('recoveryEmail').value = '';
                } else {
                    // Style error alerts elegantly
                    statusDiv.classList.add('text-red-500', 'bg-red-50', 'border-red-200');
                    statusDiv.innerText = data.message || "Failed to process password reset request.";
                }
            } catch (err) {
                statusDiv.classList.remove('hidden');
                statusDiv.classList.add('text-red-500', 'bg-red-50', 'border-red-200');
                statusDiv.innerText = "Could not connect to the authentication server.";
            }
        });
    </script>
</body>
</html>
